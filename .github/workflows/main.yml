name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Show Node version
        run: node -v

      - name: Install dependencies
        run: echo "Installing dependencies..."

      - name: Run app
        run: node app.js

      - name: Build step
        run: echo "Build completed successfully"
